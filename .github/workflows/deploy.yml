name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install and build complete app
      run: |
        # Installer toutes les dépendances
        npm ci
        # Builder l'application
        npm run build

    - name: Create deployment package
      run: |
        # Créer un package de déploiement pour Elastic Beanstalk
        mkdir -p eb-package
        
        # Copier les fichiers nécessaires
        cp -r dist eb-package/
        cp package.json eb-package/
        cp package-lock.json eb-package/ 2>/dev/null || true
        
        # Si vous avez un dossier server séparé, le copier aussi
        if [ -d "server" ]; then
          cp -r server eb-package/
        fi
        
        # Créer le fichier zip
        cd eb-package
        zip -r ../deploy.zip . -x "*.git*" "node_modules/*"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: FreemindVisionApp
        environment_name: freemindvision-prod
        version_label: ${{ github.sha }}
        region: us-east-1
        deployment_package: deploy.zip
