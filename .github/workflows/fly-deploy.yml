name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy FreeMind Vision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        run: |
          flyctl secrets set DATABASE_URL="${{ secrets.DATABASE_URL }}" --app freemindvision-app
          flyctl deploy --remote-only --app freemindvision-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
