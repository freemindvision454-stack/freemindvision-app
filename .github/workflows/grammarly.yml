name: Grammarly Auto Fix

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  grammarly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Grammarly CLI
        run: |
          curl -L https://raw.githubusercontent.com/grammarly/grammarly-cli/main/install.sh | bash
          echo "$HOME/.grammarly/bin" >> $GITHUB_PATH

      - name: Run Grammarly Auto-Fix
        run: |
          grammarly --fix --verbose .

      - name: Commit Grammarly Fixes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Grammarly auto-fix applied"
          branch: main
