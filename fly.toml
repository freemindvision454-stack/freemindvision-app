# Fly.io configuration for FreeMind Vision
# Documentation: https://fly.io/docs/reference/configuration/

app = "freemindvision-app"
primary_region = "cdg"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DATABASE_URL = "postgresql://postgres.umulfmngekjummrmhbja:FreeMind2025Visio@aws-0-eu-west-1.pooler.supabase.com:6543/postgres"
  SESSION_SECRET = "274fb5d720a3b6285f6a1283905bcb0f7d0ddc01fb09f2ec950c7234ebbd72e9"
  MIGRATIONS_AUTO_RUN = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

  size = "shared-cpu-1x"
  memory = "512mb"

swap_size_mb = 512

[deploy]
  release_command = "npx tsx server/migrate.ts"
