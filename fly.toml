app = "freemindvision-app"
primary_region = "cdg"

[build]

[env]
PORT = "8080"
NODE_ENV = "production"

[[services]]
internal_port = 8080
protocol = "tcp"
processes = ["app"]

  [[services.ports]]
  port = 80

  [[services.ports]]
  port = 443

  [[services.tcp_checks]]
  interval = "15s"
  timeout = "5s"

[processes]
app = "node dist/index.js"